<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Law Call is a free roadside legal protection demo for protected journeys, incident packets, and participating attorney consultation requests."
    />
    <link rel="icon" type="image/png" href="lawcall-hero.png" />
    <title>Law Call</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const landingSectionHashes = new Map([
        ['#how', 'how'],
        ['#attorneys', 'attorneys'],
      ]);

      function keepLandingSectionHashesOutOfTheRouter() {
        const targetId = landingSectionHashes.get(window.location.hash);

        if (!targetId) {
          return;
        }

        history.replaceState(null, '', `${window.location.pathname}${window.location.search}`);

        requestAnimationFrame(() => {
          document.getElementById(targetId)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      }

      window.addEventListener('hashchange', keepLandingSectionHashesOutOfTheRouter);
      keepLandingSectionHashesOutOfTheRouter();
    </script>
    <script type="module">
      const isLocalDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

      if (isLocalDev) {
        await import('/src/main.jsx');
      } else {
        const stylesheet = document.createElement('link');
        stylesheet.rel = 'stylesheet';
        stylesheet.href = './assets/app.css';
        document.head.appendChild(stylesheet);
        await import('./assets/app.js');
      }
    </script>
  </body>
</html>
