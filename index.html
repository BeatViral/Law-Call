<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Law Call is a free roadside legal protection demo for protected journeys, incident packets, and participating attorney consultation requests."
    />
    <link rel="icon" type="image/png" href="lawcall-hero.png" />
    <title>Law Call</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const landingSectionHashes = new Map([
        ['#how', 'how'],
        ['#attorneys', 'attorneys'],
      ]);

      function scrollToLandingSection(targetId, attempts = 12) {
        const target = document.getElementById(targetId);

        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          return;
        }

        if (attempts > 0) {
          requestAnimationFrame(() => scrollToLandingSection(targetId, attempts - 1));
        }
      }

      document.addEventListener(
        'click',
        (event) => {
          const trigger = event.target.closest?.('a[href="#how"], a[href="#attorneys"]');

          if (!trigger) {
            return;
          }

          event.preventDefault();
          const targetId = landingSectionHashes.get(trigger.getAttribute('href'));
          history.replaceState(null, '', `${window.location.pathname}${window.location.search}`);
          scrollToLandingSection(targetId);
        },
        true,
      );

      function keepLandingSectionHashesOutOfTheRouter() {
        const targetId = landingSectionHashes.get(window.location.hash);

        if (!targetId) {
          return;
        }

        history.replaceState(null, '', `${window.location.pathname}${window.location.search}`);
        window.dispatchEvent(new HashChangeEvent('hashchange'));
        scrollToLandingSection(targetId);
      }

      window.addEventListener('hashchange', keepLandingSectionHashesOutOfTheRouter);
      keepLandingSectionHashesOutOfTheRouter();
    </script>
    <script type="module">
      const isLocalDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

      if (isLocalDev) {
        await import('/src/main.jsx');
      } else {
        const stylesheet = document.createElement('link');
        stylesheet.rel = 'stylesheet';
        stylesheet.href = './assets/app.css';
        document.head.appendChild(stylesheet);
        await import('./assets/app.js');
      }
    </script>
  </body>
</html>
