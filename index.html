<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Law Call is a free roadside legal protection demo for protected journeys, incident packets, and participating attorney consultation requests."
    />
    <link rel="icon" type="image/png" href="lawcall-hero.png" />
    <title>Law Call</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const landingSectionHashes = {
          '#how': 'how',
          '#attorneys': 'attorneys',
        };
        const pendingSection = landingSectionHashes[window.location.hash];

        if (pendingSection) {
          history.replaceState(null, '', `${window.location.pathname}${window.location.search}`);
        }

        function scrollToLandingSection(targetId, attempts = 20) {
          const target = document.getElementById(targetId);

          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            return;
          }

          if (attempts > 0) {
            requestAnimationFrame(() => scrollToLandingSection(targetId, attempts - 1));
          }
        }

        document.addEventListener(
          'click',
          (event) => {
            const trigger = event.target.closest?.('a[href="#how"], a[href="#attorneys"]');

            if (!trigger) {
              return;
            }

            event.preventDefault();
            scrollToLandingSection(landingSectionHashes[trigger.getAttribute('href')]);
          },
          true,
        );

        if (pendingSection) {
          window.addEventListener('load', () => scrollToLandingSection(pendingSection), {
            once: true,
          });
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
